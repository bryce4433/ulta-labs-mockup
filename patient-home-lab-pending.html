<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mochi — Home, lab results pending (Ulta Labs mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --text: #000014;          /* text-default (blackberry 700) */
    --text-subtle: #606069;   /* gray 400 */
    --secondary: #3b3b8d;     /* blackberry 300 */
    --secondary-subtle: #ebebf4;
    --bg: #f3f6f9;            /* bg-subtle (screen) */
    --card: #ffffff;
    --border-subtle: #3b3b8d26;
    --ok-700: #0b8850; --ok-500: #17b26a; --ok-50: #ecfdf3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #d9dee4; color: var(--text);
    display: flex; justify-content: center; padding: 28px 16px 48px;
    -webkit-font-smoothing: antialiased;
  }
  .phone { width: 390px; background: var(--bg); border-radius: 46px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,20,.28); border: 1px solid rgba(0,0,30,.06); }
  .statusbar { height: 54px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #0b0b16; }
  .statusbar .right { display: flex; align-items: center; gap: 7px; }
  .battery { border: 1.5px solid #0b0b16; border-radius: 4px; padding: 1px 3px; font-size: 10px; font-weight: 700; }

  .screen { padding: 8px 20px 16px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 20px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header .icons { display: flex; align-items: center; gap: 18px; }
  .icon-btn { position: relative; color: var(--text); display: flex; }
  .badge { position: absolute; top: -7px; right: -8px; background: var(--secondary); color: #fff; font-size: 11px; font-weight: 600; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }

  /* order/med/lab card = StandardCard */
  .card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .card + .card { margin-top: 12px; }
  .crow { display: flex; align-items: center; gap: 12px; }
  .grow { flex: 1; min-width: 0; }
  .thumb { width: 40px; height: 40px; border-radius: 8px; background: #f3f6f9; border: 1px solid #eef1f6; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .ctitle { font-size: 16px; font-weight: 600; letter-spacing: -0.1px; }
  .csub { font-size: 14px; color: var(--text-subtle); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chev { color: var(--text-subtle); flex-shrink: 0; }

  /* progress bar (DispensingPlansMedicationProgress) */
  .progress { position: relative; height: 26px; margin-top: 12px; }
  .track { position: absolute; top: 11px; left: 0; right: 0; height: 6px; border-radius: 999px; background: var(--secondary-subtle); overflow: hidden; }
  .fill { position: absolute; top: 0; left: 0; bottom: 0; border-radius: 999px; background: linear-gradient(90deg, #3b3b8d80, #3b3b8d); }
  .pcircle { position: absolute; top: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--card); border: 1px solid var(--secondary); display: flex; align-items: center; justify-content: center; transform: translateX(-50%); }

  /* onboarding ring */
  .ring { width: 52px; height: 52px; flex-shrink: 0; }
  .ring .pct { font-size: 12px; font-weight: 600; fill: var(--secondary); }

  .section-label { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin: 26px 0 12px; }
  .med-tile { width: 40px; height: 40px; border-radius: 9px; background: #eef1f6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #e3e6ec; flex-shrink: 0; object-fit: cover; }

  .tabbar { margin: 16px 14px 14px; background: #fff; border-radius: 30px; box-shadow: 0 6px 24px rgba(0,0,30,.1); display: flex; justify-content: space-around; padding: 12px 8px 10px; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-subtle); font-size: 12px; font-weight: 500; }
  .tab.active { color: var(--text); }
  .tab.active .pill { background: #e9ebf2; }
  .pill { padding: 4px 18px; border-radius: 999px; display: flex; }
</style>
</head>
<body>
  <div class="phone">
    <div class="statusbar">
      <span style="display:flex;align-items:center;gap:7px">9:42 <svg width="15" height="15" viewBox="0 0 24 24" fill="#0b0b16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      <span class="right">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#0b0b16"/><rect x="5" y="4" width="3" height="8" rx="1" fill="#0b0b16"/><rect x="10" y="1" width="3" height="11" rx="1" fill="#0b0b16"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#0b0b16"/></svg>
        <span style="font-size:14px;font-weight:700">5G</span>
        <span class="battery">16</span>
      </span>
    </div>

    <div class="screen">
      <div class="header">
        <h1>Welcome, Bryce!</h1>
        <div class="icons">
          <span class="icon-btn">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000014" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="badge">12</span>
          </span>
          <span class="icon-btn">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#000014" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </span>
        </div>
      </div>

      <!-- onboarding -->
      <div class="card">
        <div class="crow">
          <svg class="ring" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="20" fill="none" stroke="#ece9f5" stroke-width="6"/>
            <circle cx="26" cy="26" r="20" fill="none" stroke="#3b3b8d" stroke-width="6" stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="84.2" transform="rotate(-90 26 26)"/>
            <text class="pct" x="26" y="30" text-anchor="middle">33%</text>
          </svg>
          <div class="grow">
            <div class="ctitle">Complete your onboarding</div>
            <div class="csub">2 of 6 steps complete</div>
          </div>
          <svg class="chev" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <!-- LAB ORDER card: results pending -->
      <div class="card">
        <div class="crow">
          <span class="thumb">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b3b8d" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6.5L5.2 18a2 2 0 0 0 1.8 3h10a2 2 0 0 0 1.8-3L14 9.5V3"/><path d="M7.5 15h9"/></svg>
          </span>
          <div class="grow">
            <div class="ctitle">Results pending review</div>
            <div class="csub">Mochi Health Panel</div>
          </div>
          <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="progress">
          <div class="track"><div class="fill" style="width:75%"></div></div>
          <div class="pcircle" style="left:75%">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000014" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
          </div>
        </div>
      </div>

      <!-- MED ORDER card: delivered (context) -->
      <div class="card">
        <div class="crow">
          <span class="thumb">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="18" rx="3" fill="#3b3b8d"/><rect x="9" y="9" width="6" height="6" fill="#000014" opacity=".55"/></svg>
          </span>
          <div class="grow">
            <div class="ctitle">Delivered Jun 10</div>
            <div class="csub">NAD+ 200mg/ml</div>
          </div>
          <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="progress">
          <div class="track"><div class="fill" style="width:100%"></div></div>
          <div class="pcircle" style="left:100%">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000014" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16l2 2 4-4"/><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.17"/><path d="M3.29 7 12 12l8.71-5"/><path d="M12 22V12"/></svg>
          </div>
        </div>
      </div>

      <!-- Medications -->
      <div class="section-label">Medications</div>
      <div class="card">
        <div class="crow">
          <span class="med-tile">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="5" y="5" width="6" height="14" rx="2" fill="#000014"/><rect x="5" y="9" width="6" height="5" fill="#3b3b8d"/><rect x="13" y="5" width="6" height="14" rx="2" fill="#3b3b8d"/><rect x="13" y="9" width="6" height="5" fill="#000014" opacity=".6"/></svg>
          </span>
          <div class="grow"><div class="ctitle">Explore GLP-1 treatments</div></div>
          <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <!-- Care Team -->
      <div class="section-label">Care Team</div>
      <div class="card">
        <div class="crow">
          <span class="avatar"></span>
          <div class="grow"><div class="ctitle">Rashid Awan</div><div class="csub">Health</div></div>
          <svg class="chev" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab active"><span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home</div>
      <div class="tab"><span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="9"/></svg></span>Progress</div>
      <div class="tab"><span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>Shop</div>
      <div class="tab"><span class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile</div>
    </div>
  </div>
</body>
</html>
